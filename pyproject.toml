[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sqlite-manager"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Jaco Verster", email = "versterrie@gmail.com" }
]
requires-python = ">=3.11"
dependencies = []

[project.scripts]
sqlite-manager = "sqlite_manager:main"

[project.optional-dependencies]
users = [
    "bcrypt>=4.3.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "ruff>=0.11.2",
]
users = [
    "ipykernel>=6.29.5",
]
